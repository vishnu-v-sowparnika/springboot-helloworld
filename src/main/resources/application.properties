# Spring Boot Application Properties

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=Spring Boot Hello World

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.helloworld=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Jackson JSON Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent-output=true

# DevTools Configuration (auto-restart on changes)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Actuator Endpoints (optional)
# Uncomment to enable actuator endpoints
# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=always
