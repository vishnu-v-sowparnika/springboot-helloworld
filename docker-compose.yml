# Docker Compose for Spring Boot Application

version: '3.8'

services:
  springboot-app:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: springboot-helloworld
    
    ports:
      - "8080:8080"
    
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SERVER_PORT=8080
    
    restart: unless-stopped
    
    # Optional: volume for logs
    volumes:
      - ./logs:/app/logs
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
